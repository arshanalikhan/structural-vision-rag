<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IS Code AI Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 400px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }
        .chat-box {
            height: 400px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px;
            border-radius: 5px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .user-msg {
            background: #3498db;
            color: white;
            align-self: flex-end;
        }
        .bot-msg {
            background: #ecf0f1;
            color: #333;
            align-self: flex-start;
        }
        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }
        button {
            padding: 10px 15px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            margin-left: 10px;
            cursor: pointer;
        }
        button:hover {
            background: #1a252f;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">IS Code AI Assistant</div>
    <div class="chat-box" id="chat-box">
        <div class="message bot-msg">Hello! Ask me anything about IS456.</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your query..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const query = inputField.value.trim();

        if (!query) return;

        // Display user message
        chatBox.innerHTML += `<div class="message user-msg">${query}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Send query to Flask backend
            const response = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: query })
            });
            
            const data = await response.json();
            
            // Format and display bot message
            const botReply = `<strong>Section ${data.section} - ${data.title}</strong><br>${data.content}`;
            chatBox.innerHTML += `<div class="message bot-msg">${botReply}</div>`;
        } catch (error) {
            chatBox.innerHTML += `<div class="message bot-msg" style="color: red;">Error connecting to the server.</div>`;
        }
        
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
